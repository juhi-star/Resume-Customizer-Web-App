services:
  - type: web
    name: resume-customizer-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: JWT_SECRET_KEY
        generateValue: true
